{% extends 'base.html' %}
{% block content %}
<div class="container mt-4" style="max-width: 600px;">
  <h4>Edit Comment</h4>
  <form method="POST">
    {{ form.hidden_tag() }}
    <div class="mb-3">
      {{ form.content.label(class="form-label") }}
      {{ form.content(class="form-control", rows=4) }}
    </div>
    <button type="submit" class="btn btn-primary">Save Changes</button>
    <a href="{{ url_for('view_thread', thread_id=comment.thread_id) }}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
